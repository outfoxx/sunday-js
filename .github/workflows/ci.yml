name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    types: [ opened, synchronize, reopened ]
    branches: [ main ]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - uses: oven-sh/setup-bun@v2
      with:
        bun-version: 1.3.10

    - name: Install Packages
      run: |
        bun install --frozen-lockfile

    - name: Check
      run: bun run check

    - name: Verify JUnit Test Report
      run: test -s reports/test-report.xml

    - name: Verify LCOV Coverage Report
      run: test -s reports/coverage/lcov.info

    - name: Bun ESM Smoke
      run: bun run smoke:esm:bun

    - uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Node ESM Smoke
      run: node ./tools/ci/esm-smoke.mjs

    - name: Prepare ESLint Report
      run: sed -i 's+/home/runner/work/sunday-js/sunday-js+/github/workspace+g' reports/lint.json

    - name: SonarCloud Scan
      uses: SonarSource/sonarqube-scan-action@v7.0.0
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
