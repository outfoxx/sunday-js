name: Publish Release

on:
  push:
    tags:
    - 'v*.*.*'
    - '*.*.*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - uses: oven-sh/setup-bun@v2
      with:
        bun-version: 1.3.10

    - name: Check Version Format in Tag
      id: version
      uses: nowsprinting/check-version-format-action@v3

    - name: Install Packages
      run: bun install --frozen-lockfile

    - name: Stamp Package Version
      run: bun pm pkg set version=${{ steps.version.outputs.full_without_prefix }}

    - name: Publish Package
      run: bun publish
      env:
        NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}

    - name: Build Documentation
      run: bun run docs -- --out docs/${{ github.ref_name }}

    - name: Publish Documentation
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        branch: gh-pages
        clean: false
        folder: docs

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        name: 🚀 ${{ github.ref_name }}
        tag_name: ${{ github.ref_name }}
        generate_release_notes: true
        prerelease: ${{ steps.version.outputs.is_stable != 'true' }}
        draft: false
